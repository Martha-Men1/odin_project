<!-- Absolute and relative links -->

<!-- 
    Absolute links: Links to pages on other websites on the internet are called 
    absolute links. A typical absolute link will be made up of the following 
    parts: scheme://domain/path. An absolute link will always contain the scheme 
    and domain of the destination.

    Example: https://www.theodinproject.com/about

    Relative links: Links to other pages within our own website are called 
    relative links. Relative links do not include the domain name, since it is 
    another page on the same site, it assumes the domain name will be the same 
    as the page we created the link on.
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Odin Links and Images</title>
  </head>

  <body>
    <h1>About Page</h1>

    <img src="../images/dog.jpg">


  </body>
</html>
