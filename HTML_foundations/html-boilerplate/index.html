<!DOCTYPE html> <!-- The doctype’s purpose is to tell the browser what version of HTML it should use to render the document. -->
<html lang="en"> <!-- This is what’s known as the root element of the document, meaning that every other element in the document will be a descendant of it.  -->
    <head> <!-- Where we put important meta-information about our webpages, and stuff required for our webpages to render correctly in the browser.  -->
        <meta charset="UTF-8"> <!-- Ensures that the webpage will display special symbols and characters from different languages correctly in the browser. -->
        <title>My First Webpage</title> <!-- The <title> element is used to give webpages a human-readable title, which is displayed in our webpage’s browser tab.  -->
    </head>

    <body> <!--This is where all the content that will be displayed to users will go - the text, images, lists, links, and so on-->
        <h1>Hello World!</h1>
    </body>

</html>
