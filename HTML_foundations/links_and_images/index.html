<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Homepage</h1>

    <!-- Anchor elements -->

    <!-- 
    To create a link in HTML, we use the anchor element. An anchor element
    is defined by wrapping the text or another HTML element we want to be a link 
    with an <a> tag.
    
    <a>About The Odin Project</a>

    This line of code above is not a link yet it needs an attribute.   
    
    Def: [Attribute]
    An HTML attribute gives additional information to an HTML element and always 
    goes in the element’s opening tag. An attribute is usually made up of two 
    parts: a name, and a value; however, not all attributes require a value. 

    In our case, we need to add an href (hypertext reference) attribute to the 
    opening anchor tag. The value of the href attribute is the destination we 
    want our link to go to.

    -->

    <h4> Opening links </h4>

    <a href="https://www.theodinproject.com/about">About The Odin Project</a>

    <!-- Opening links in a new tab -->

    <h4> Opening links in a new tab </h4>

    <!-- 
    By adding the target attribute specifies where the linked resouce will 
    be opened. If it is not present, then, by default, it will take on the _self 
    value which opens the link in the current tab. To open the link in a new tab 
    or window (depends on browser settings) you can set it to _blank as follows: 
    -->

    <a href="https://www.theodinproject.com/about" target="_blank" rel="noreferrer">About The Odin Project</a>

    <!-- 
    The attribute re; is used to describe the relation between the current 
    page and the linked document and can take multiple values. 

    Relevent ones are:

        noopener: Prevents the new tab from accessing the original page, which
        would have opened the possibility of phishing attacks like tabnabbing. 
        Modern browsers all set this automatically for any links that have 
        target="_blank", but you will often still see this manually set for 
        historic browser compatibility.

        noreferrer: The same as noopener but also prevents certain details about 
        the original page from being passed to the new page; referrer 
        information is not always desirable to share.

    -->

    <h4> Relative links </h4>

    <a href="./pages/about.html">About</a>

    <!-- 
    
    In many cases, this will work just fine; however, you can still run 
    into unexpected issues with this approach. Prepending ./ before the link 
    will in most cases prevent such issues. By adding ./ you are specifying to 
    your code that it should start looking for the file/directory relative to 
    the current directory.
    
    -->

    <!-- Images -->

    <h4> Images </h4>

    <!-- 
    To display an image in HTML we use the <img> element. 

    To display images on your website that are hosted on your own web server, 
    you can use a relative path.
    -->

    <img src="./images/dog.jpg">

    <!-- Alt and image size attribute -->

    <h4> Alt attribute </h4>

    <!-- 
    Def: [alt attribute] 
    The alt attribute is used to describe an image. It will be used in place of 
    the image if it cannot be loaded. It is also used with screen readers to 
    describe what the image is to visually impaired users.
    -->

    <img src="./images/dog.jpg" alt="dog photo" height="310" width="310">

</body>
</html>
